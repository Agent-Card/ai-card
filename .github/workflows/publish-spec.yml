name: Publish Specification

on:
  pull_request:
    paths:
      - .github/workflows/publish-spec.yml
      - pyproject.toml
      - uv.lock
      - specification/ai-catalog.md
      - specification/respec-config.json
      - tools/build_spec.py
  push:
    branches:
      - ai-catalog-spec
    paths:
      - .github/workflows/publish-spec.yml
      - pyproject.toml
      - uv.lock
      - specification/ai-catalog.md
      - specification/respec-config.json
      - tools/build_spec.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spec-pages-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build specification site
        run: |
          uv run --python 3.12 --locked python tools/build_spec.py specification/ai-catalog.md dist/index.html --config specification/respec-config.json

      - name: Add GitHub Pages marker
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/ai-catalog-spec'
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/ai-catalog-spec'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/ai-catalog-spec'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4