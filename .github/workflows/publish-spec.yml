name: Publish Specification

on:
  pull_request:
    paths:
      - .github/workflows/publish-spec.yml
      - requirements-spec.txt
      - specification/ai-catalog.md
      - specification/respec-config.json
      - tools/build_spec.py
  push:
    branches:
      - ai-catalog-spec
    paths:
      - .github/workflows/publish-spec.yml
      - requirements-spec.txt
      - specification/ai-catalog.md
      - specification/respec-config.json
      - tools/build_spec.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spec-pages-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: requirements-spec.txt

      - name: Resolve editor's draft URL
        id: ed_draft
        uses: actions/github-script@v7
        with:
          script: |
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            if (context.eventName === 'pull_request') {
              core.setOutput('url', context.payload.pull_request.html_url);
              return;
            }

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
            });

            core.setOutput('url', pulls[0]?.html_url || repoUrl);

      - name: Build specification site
        run: |
          uv run --python 3.12 --with-requirements requirements-spec.txt python tools/build_spec.py specification/ai-catalog.md dist/index.html --config specification/respec-config.json --ed-draft-uri "${{ steps.ed_draft.outputs.url }}"

      - name: Add GitHub Pages marker
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/ai-catalog-spec'
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/ai-catalog-spec'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/ai-catalog-spec'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4